<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body>
    <div class="container">
      <h1>Log In</h1>
      <div class="input-group">
        <label>Mail:</label>
        <input type="email" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" />
      </div>

      <button id="sbt-button">Submit</button>

      <div class="button-link">
        <span>Register:</span>
        <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </body>
</html>
