<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signup</title>
  </head>
  <body>
    <div class="container">
      <h1>Sign Up</h1>

      <div class="input-group">
        <label>Name:</label>
        <input type="text" />
      </div>

      <div class="input-group">
        <label>Email:</label>
        <input type="email" />
      </div>

      <div class="input-group">
        <label>Password:</label>
        <input type="password" />
      </div>

      <div class="input-group">
        <label>Password Confirmation:</label>
        <input type="password" />
      </div>

      <button class="sbt-button">Submit</button>

      <div class="button-link">
        <span>Already have an account?</span>
        <a href="login.html">Log In</a>
    </div>
    </div>
  </body>
</html>
